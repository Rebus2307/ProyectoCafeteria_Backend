services:
  yugabyte:
    image: yugabytedb/yugabyte:latest
    container_name: codffee-yugabyte
    restart: always
    command: bin/yugabyted start --daemon=false --listen=0.0.0.0
    ports:
      - "5433:5433"
      - "7000:7000"
      - "9000:9000"
      - "15433:15433"
    volumes:
      - codffee_yugabyte_data:/home/yugabyte/var
    networks:
      - codffee-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codffee-backend
    restart: always
    depends_on:
      - yugabyte
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://yugabyte:5433/yugabyte
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
    networks:
      - codffee-network

volumes:
  codffee_yugabyte_data:

networks:
  codffee-network: